workflows:
  capacitor-android:
    name: Capacitor Android Release
    instance_type: mac_mini_m2
    scripts:
      - name: Install deps
        script: npm install
      - name: Build Web
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build AAB
        script: cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    environment:
      android_signing:
        - keystore: $CM_KEYSTORE
          keystore_password: $CM_KEYSTORE_PASSWORD
          key_alias: $CM_KEY_ALIAS
          key_password: $CM_KEY_PASSWORD